<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18181b"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4d2e"/>
      <stop offset="1" stop-color="#ffd84d"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- decorative glow shapes -->
  <circle cx="680" cy="80" r="140" fill="#ff4d2e" opacity="0.10"/>
  <circle cx="60" cy="400" r="120" fill="#38bdf8" opacity="0.08"/>

  <!-- shield with lock -->
  <g transform="translate(120,95)">
    <path d="M100 0 L190 35 V120 C190 190 150 230 100 260 C50 230 10 190 10 120 V35 Z" fill="url(#shield)" opacity="0.95"/>
    <rect x="70" y="120" width="60" height="55" rx="8" fill="#18181b"/>
    <path d="M82 120 V100 a18 18 0 0 1 36 0 V120" fill="none" stroke="#18181b" stroke-width="10"/>
    <circle cx="100" cy="145" r="7" fill="#ffd84d"/>
  </g>

  <!-- globe lines suggesting worldwide/EU servers -->
  <g transform="translate(430,60)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" fill="none">
    <circle cx="130" cy="150" r="130"/>
    <ellipse cx="130" cy="150" rx="130" ry="55"/>
    <ellipse cx="130" cy="150" rx="65" ry="130"/>
    <line x1="0" y1="150" x2="260" y2="150"/>
  </g>

  <text x="430" y="330" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">FS VPN</text>
  <text x="430" y="368" font-family="Arial, sans-serif" font-size="21" font-weight="600" fill="#ffd84d">для вебкам-моделей</text>
  <text x="430" y="398" font-family="Arial, sans-serif" font-size="16" fill="#d4d4d8">Chaturbate · Stripchat · OnlyFans</text>
</svg>
