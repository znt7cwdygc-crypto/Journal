name: Deploy to server

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 185.112.83.74
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            # Zero-downtime deploy
            DEPLOY_DIR="/opt/site-next"
            LIVE_DIR="/opt/site"
            OLD_DIR="/opt/site-old"
            ENV_FILE="/opt/env.production"

            # 0. Ensure env file exists in safe location
            if [ ! -f "$ENV_FILE" ]; then
              cp "$LIVE_DIR/.env.local" "$ENV_FILE" 2>/dev/null || true
            fi

            # 1. Clone fresh
            rm -rf "$DEPLOY_DIR"
            git clone --depth 1 https://github.com/znt7cwdygc-crypto/Journal.git "$DEPLOY_DIR"
            cp "$ENV_FILE" "$DEPLOY_DIR/.env.local"

            # 2. Build (site stays live)
            cd "$DEPLOY_DIR"
            npm install
            npx prisma generate
            export $(grep -E '^DATABASE_URL=' .env.local | xargs -d '\n')
            npx prisma db push --accept-data-loss 2>&1 | tail -1
            npm run build
            cp -r .next/static /var/www/static/_next/

            # 3. Swap instantly
            rm -rf "$OLD_DIR"
            mv "$LIVE_DIR" "$OLD_DIR"
            mv "$DEPLOY_DIR" "$LIVE_DIR"

            # 4. Restart PM2
            cd "$LIVE_DIR"
            pm2 delete site 2>/dev/null || true
            NODE_ENV=production PORT=3000 pm2 start node --name site -- node_modules/.bin/next start -p 3000
            pm2 save

            # 5. Cleanup
            rm -rf "$OLD_DIR"
            echo "Production deploy done: $(date)"

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy dev via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 185.112.83.74
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd /opt/site-dev
            git fetch origin dev
            git checkout dev
            git reset --hard origin/dev
            cp /opt/env.production .env.local
            npm install
            npx prisma generate
            export $(grep -E '^DATABASE_URL=' .env.local | xargs -d '\n')
            npx prisma db push --accept-data-loss 2>&1 | tail -1
            npm run build
            pm2 delete site-dev 2>/dev/null || true
            NODE_ENV=production PORT=3001 pm2 start node --name site-dev -- node_modules/.bin/next start -p 3001
            pm2 save
            echo "Dev deploy done: $(date)"
